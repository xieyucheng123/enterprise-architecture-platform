name: PR Review

on:
  pull_request:
    types: [opened, synchronize, labeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  review-ai:
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OpenHands Review
        uses: OpenHands/extensions/plugins/pr-review@main
        with:
          llm-model: ${{ secrets.LLM_MODEL || 'openai/glm-5.2' }}
          llm-base-url: ${{ secrets.LLM_BASE_URL || 'https://api.modelarts-maas.com/v2' }}
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          github-token: ${{ secrets.PAT_TOKEN }}

      - name: Check AI Review Verdict
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          sleep 5
          VERDICT=$(gh api repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews \
            --jq '[.[] | select(.user.login | test("openhands|all-hands|bot"))] | sort_by(.submitted_at) | last | .state' 2>/dev/null || echo "UNKNOWN")

          echo "Latest AI review verdict: $VERDICT"

          if [ "$VERDICT" = "APPROVED" ]; then
            echo "AI approved the PR"
          elif [ "$VERDICT" = "CHANGES_REQUESTED" ]; then
            echo "::error::AI requested changes, blocking merge"
            exit 1
          else
            echo "::error::No clear AI review verdict found (got: $VERDICT), treating as needs review"
            exit 1
          fi

  review-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Database Changes
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          CHANGED_FILES=$(gh api repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files --jq '.[].filename' 2>/dev/null)

          DB_FILES=$(echo "$CHANGED_FILES" | grep -iE '(migration|\.sql$|schema|database|\.prisma$|alembic|diesel)' || true)

          if [ -z "$DB_FILES" ]; then
            echo "No database-related files changed, auto-approved"
            exit 0
          fi

          echo "Database files changed:"
          echo "$DB_FILES"

          if echo "$PR_LABELS" | grep -q "db-approved"; then
            echo "PR has db-approved label, proceeding"
            exit 0
          fi

          echo "::error::Database changes detected. Manual approval required."
          echo "::error::Add 'db-approved' label to approve these changes:"
          echo "$DB_FILES"
          exit 1
