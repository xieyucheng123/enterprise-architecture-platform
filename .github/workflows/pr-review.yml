name: PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write

jobs:
  continue-fix:
    if: ${{ github.event_name == 'issue_comment' && github.event.comment.body == 'continue-fix' && github.event.issue.pull_request != null && contains('OWNER,MEMBER,COLLABORATOR', github.event.comment.author_association) }}
    runs-on: ubuntu-latest
    steps:
      - name: Log continue-fix trigger
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENTER: ${{ github.event.comment.user.login }}
          ASSOC: ${{ github.event.comment.author_association }}
        run: |
          echo "continue-fix on PR #$PR_NUMBER by $COMMENTER ($ASSOC)"

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get PR info and dispatch auto-fix
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DISPATCH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_INFO=$(gh api repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER \
            --jq '{head_branch: .head.ref, head_sha: .head.sha}')
          HEAD_BRANCH=$(echo "$PR_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin)['head_branch'])")
          HEAD_SHA=$(echo "$PR_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin)['head_sha'])")

          echo "Dispatching auto-fix for PR #$PR_NUMBER (branch: $HEAD_BRANCH)"
          echo "max_iterations=6 (3 original + 3 continue)"

          GH_TOKEN="$DISPATCH_TOKEN" gh workflow run pr-auto-fix.yml \
            -f pr_number="$PR_NUMBER" \
            -f head_branch="$HEAD_BRANCH" \
            -f head_sha="$HEAD_SHA" \
            -f max_iterations="6" || echo "Failed to dispatch auto-fix"

      - name: React to comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID/reactions" \
            -f content="rocket" 2>/dev/null || true

  review-ai:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    concurrency:
      group: review-ai-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OpenHands Review
        uses: OpenHands/extensions/plugins/pr-review@main
        with:
          llm-model: ${{ secrets.LLM_MODEL || 'openai/glm-5.2' }}
          llm-base-url: ${{ secrets.LLM_BASE_URL || 'https://api.modelarts-maas.com/v2' }}
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check AI Review Verdict
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DISPATCH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          VERDICT="UNKNOWN"
          REVIEW_BODY=""
          for i in 1 2 3 4 5 6; do
            sleep 5
            REVIEW_JSON=$(gh api repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews \
              --jq "[.[] | select(.user.login == \"github-actions[bot]\" and (.commit_id // \"\") == \"$HEAD_SHA\")] | sort_by(.submitted_at) | last | {state: .state, body: .body}" 2>/dev/null || echo "{}")
            VERDICT=$(echo "$REVIEW_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('state','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
            if [ "$VERDICT" != "null" ] && [ "$VERDICT" != "UNKNOWN" ] && [ -n "$VERDICT" ]; then
              REVIEW_BODY=$(echo "$REVIEW_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))" 2>/dev/null || echo "")
              break
            fi
            echo "Retry $i: verdict not ready yet ($VERDICT)"
          done

          echo "Latest AI review verdict: $VERDICT"

          if [ "$VERDICT" = "APPROVED" ]; then
            echo "AI approved the PR"
          elif [ "$VERDICT" = "CHANGES_REQUESTED" ]; then
            echo "::error::AI requested changes, blocking merge"
            echo "Dispatching PR Auto-Fix..."
            GH_TOKEN="$DISPATCH_TOKEN" gh workflow run pr-auto-fix.yml \
              -f pr_number="$PR_NUMBER" \
              -f head_branch="${{ github.event.pull_request.head.ref }}" \
              -f head_sha="$HEAD_SHA" || echo "Failed to dispatch auto-fix"
            exit 1
          elif [ "$VERDICT" = "COMMENTED" ]; then
            if echo "$REVIEW_BODY" | grep -qE '🔴|🟠'; then
              echo "::error::AI review has Critical/Important issues, blocking merge"
              echo "Dispatching PR Auto-Fix..."
              GH_TOKEN="$DISPATCH_TOKEN" gh workflow run pr-auto-fix.yml \
                -f pr_number="$PR_NUMBER" \
                -f head_branch="${{ github.event.pull_request.head.ref }}" \
                -f head_sha="$HEAD_SHA" || echo "Failed to dispatch auto-fix"
              exit 1
            else
              echo "AI review has no Critical/Important issues, passing"
            fi
          else
            echo "::error::No AI review found (got: $VERDICT)"
            exit 1
          fi
