name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Strict Review
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'openai/glm-5.2' }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.modelarts-maas.com/v2' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          pip install openai -q

          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" 2>/dev/null | head -5000)

          python3 << 'PYEOF'
          import os, json, subprocess
          from openai import OpenAI

          diff = os.environ.get('DIFF', '')
          pr_number = os.environ['PR_NUMBER']
          pr_title = os.environ['PR_TITLE']
          pr_body = os.environ.get('PR_BODY', '')
          head_sha = os.environ['HEAD_SHA']
          api_key = os.environ['LLM_API_KEY']
          model = os.environ['LLM_MODEL']
          base_url = os.environ['LLM_BASE_URL']

          client = OpenAI(api_key=api_key, base_url=base_url)

          prompt = f"""You are a strict code reviewer. Review the following PR diff carefully.

PR Title: {pr_title}
PR Description: {pr_body}

Diff:
{diff}

Review criteria:
1. Security: No hardcoded secrets, no SQL injection, no XSS vulnerabilities
2. Logic: No obvious bugs, edge cases handled, error handling present
3. Style: Consistent with existing code patterns, no dead code
4. Tests: New code has appropriate test coverage
5. Breaking changes: Clearly documented and justified

Respond in JSON format:
{{
  "verdict": "approve" or "request_changes",
  "summary": "one line summary",
  "issues": ["issue1", "issue2", ...]
}}

If ANY issue is found, verdict must be "request_changes".
Only "approve" if the code is production-ready with zero issues."""

          resp = client.chat.completions.create(
              model=model,
              messages=[{"role": "user", "content": prompt}],
              temperature=0.1,
          )

          content = resp.choices[0].message.content.strip()
          if content.startswith('```'):
              content = content.split('```')[1]
              if content.startswith('json'):
                  content = content[4:]
          content = content.strip()

          result = json.loads(content)
          verdict = result.get('verdict', 'request_changes')
          summary = result.get('summary', '')
          issues = result.get('issues', [])

          print(f"Verdict: {verdict}")
          print(f"Summary: {summary}")
          for i, issue in enumerate(issues):
              print(f"  Issue {i+1}: {issue}")

          body = f"## AI Review: {verdict.upper()}\n\n{summary}\n"
          if issues:
              body += "\n### Issues found:\n"
              for i, issue in enumerate(issues):
                  body += f"{i+1}. {issue}\n"

          event = 'APPROVE' if verdict == 'approve' else 'REQUEST_CHANGES'

          subprocess.run([
              'gh', 'api',
              f'repos/{os.environ["GITHUB_REPOSITORY"]}/pulls/{pr_number}/reviews',
              '--method', 'POST',
              '-f', f'event={event}',
              '-f', f'body={body}',
              '-f', f'commit_id={head_sha}',
          ], check=True)

          if verdict != 'approve':
              print("::error::AI review found issues, requesting changes")
              exit(1)
          else:
              print("AI review approved the PR")
          PYEOF
