name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo test
        run: cargo test --workspace

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        run: npx vite build

  integration:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: |
          docker compose -f docker-compose.ci.yml up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/health && break
            sleep 2
          done
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:80/health && break
            sleep 2
          done

      - name: Integration tests
        run: |
          echo "=== Test 1: Backend health ==="
          curl -sf http://localhost:8080/health
          echo ""

          echo "=== Test 2: Frontend serves HTML ==="
          curl -sf http://localhost:80/ | grep -q "html"
          echo "Frontend OK"

          echo "=== Test 3: API proxy works ==="
          curl -sf http://localhost:80/api/ -o /dev/null -w "%{http_code}" | grep -qv "502\|503\|504"
          echo "API proxy OK"

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.ci.yml down
