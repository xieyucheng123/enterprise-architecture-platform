name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Run cargo test
        working-directory: backend
        run: cargo test --workspace

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        run: npx vite build

  integration:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose -f docker-compose.ci.yml up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health 2>/dev/null; then
              echo "Backend healthy"
              break
            fi
            sleep 2
          done
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:80/health 2>/dev/null; then
              echo "Frontend healthy"
              break
            fi
            sleep 2
          done

      - name: Integration tests
        run: |
          sleep 3
          
          echo "=== Test 1: Backend health ==="
          for i in $(seq 1 5); do
            RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:8080/health 2>/dev/null) && break
            echo "Retry $i..."
            sleep 2
          done
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Backend health response: $RESPONSE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: Backend health returned $HTTP_CODE"
            docker compose -f docker-compose.ci.yml logs backend
            exit 1
          fi
          echo "Backend OK"

          echo "=== Test 2: Frontend serves HTML ==="
          curl -s http://localhost:80/ | grep -qi "html"
          echo "Frontend OK"

          echo "=== Test 3: API proxy works ==="
          PROXY_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/api/ 2>/dev/null || echo "000")
          echo "API proxy returned: $PROXY_CODE"
          if echo "$PROXY_CODE" | grep -qE "50[234]|000"; then
            echo "FAIL: API proxy returned $PROXY_CODE"
            docker compose -f docker-compose.ci.yml logs frontend
            exit 1
          fi
          echo "API proxy OK"

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.ci.yml down
