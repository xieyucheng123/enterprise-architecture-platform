name: Build and Push (ACR + ECS)

# 两段式流水线:
# 阶段1 GitHub Actions: build 后端→push ACR, build 前端→scp ECS
# 阶段2 ECS systemd timer: 自动轮询 ACR 拉取新镜像部署后端
# 前端由 ECS 上 python http.server (port 80) serve, CDN www→ECS:80

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: crpi-fswclfmtgfktdkq7.cn-guangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: eap-app

jobs:
  # ==================== 后端: Build → Push ACR ====================
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ github.sha }}" ./backend
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Trigger Aliyun Flow pipeline
        run: |
          pip install aliyun-python-sdk-core aliyun-python-sdk-devops
          aliyun devops StartPipelineRun \
            --organizationId 68c5519cf9c52e7d8c25f677 \
            --pipelineId 5143756
        continue-on-error: true

  # ==================== 前端: Build → SCP to ECS ====================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://api.xieyucheng.top/api
        run: npm run build

      - name: Deploy to ECS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/opt/eap/frontend"
          strip_components: 2
