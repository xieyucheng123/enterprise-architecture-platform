name: Build and Push (ACR + ECS)

# 两段式流水线:
# 阶段1 GitHub Actions:
#   后端 build → push ACR → 触发阿里云云效 Flow (SSH ECS pull+restart)
#   前端 build → scp ECS (CDN www→ECS:80) + upload OSS (备份)
# 阶段2 阿里云云效 Flow (pipelineId=5143756):
#   SSH ECS → podman pull ACR → restart → health check
#
# 访问:
#   www.xieyucheng.top → CDN → ECS:80 (python http.server) → 前端
#   api.xieyucheng.top → CDN → ECS:8080 → 后端

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: crpi-fswclfmtgfktdkq7.cn-guangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: eap-app
  OSS_REGION: cn-shenzhen
  OSS_BUCKET: eap-frontend-xyc

jobs:
  # ==================== 后端: Build → Push ACR → 触发云效 Flow ====================
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ github.sha }}" ./backend
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Trigger Aliyun Flow pipeline
        run: |
          npm install -g @aliyunapi/cli
          aliyun configure set --mode AK --access-key-id "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" --access-key-secret "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" --region cn-hangzhou
          aliyun devops StartPipelineRun \
            --organizationId 68c5519cf9c52e7d8c25f677 \
            --pipelineId 5143756
        continue-on-error: true

  # ==================== 前端: Build → SCP ECS + Upload OSS ====================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://api.xieyucheng.top/api
        run: npm run build

      - name: Deploy to ECS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/opt/eap/frontend"
          strip_components: 2

      - name: Install ossutil
        run: |
          curl -L -o ossutil https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil && sudo mv ossutil /usr/local/bin/ossutil

      - name: Sync to OSS (backup)
        run: |
          ossutil config \
            -e "oss-${{ env.OSS_REGION }}.aliyuncs.com" \
            -i "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            -k "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"
          ossutil cp -rf frontend/dist/ "oss://${{ env.OSS_BUCKET }}/"
        continue-on-error: true
