name: Build and Push (ACR + OSS)

# 两段式流水线:
# 阶段1 GitHub Actions:
#   后端 build → push ACR → 触发阿里云云效 Flow (SSH ECS pull+restart)
#   前端 build → upload OSS → object 设公共读 (CDN www→OSS 静态网站托管)
# 阶段2 阿里云云效 Flow (pipelineId=5143756):
#   SSH ECS → bash /opt/eap/eap-autodeploy.sh → podman pull ACR → restart → health check
#
# 部署触发: 云效 Flow 为唯一部署触发源 (已移除 ECS systemd timer 轮询)
# Flow 触发使用 Webhook URL (FLOW_WEBHOOK_URL secret)
#
# 访问:
#   www.xieyucheng.top → CDN → OSS (object 公共读 + 静态网站托管) → 前端
#   api.xieyucheng.top → CDN → ECS:8080 → 后端

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: crpi-fswclfmtgfktdkq7.cn-guangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: eap-app
  OSS_REGION: cn-shenzhen
  OSS_BUCKET: eap-frontend-xyc

jobs:
  # ==================== 后端: Build → Push ACR → 触发云效 Flow ====================
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ github.sha }}" ./backend
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Trigger Aliyun Flow pipeline
        run: |
          curl -s --fail -H "Content-Type: application/json" -X POST -d '{}' \
            "${{ secrets.FLOW_WEBHOOK_URL }}"

      - name: Clean old ACR tags (keep latest 10)
        run: |
          # ACR 个人版 registry v2 API: 列出所有 tag，获取 digest，按时间排序，删旧的
          REGISTRY="${{ env.ACR_REGISTRY }}"
          REPO="${{ env.ACR_NAMESPACE }}/backend"
          AUTH="${{ secrets.ACR_USERNAME }}:${{ secrets.ACR_PASSWORD }}"

          # 获取所有 tag
          TAGS=$(curl -s -u "$AUTH" "https://$REGISTRY/v2/$REPO/tags/list" | jq -r '.tags[]' | grep -v latest | sort)

          # 获取每个 tag 的 digest 和创建时间，按时间倒序
          TAG_INFO=""
          for TAG in $TAGS; do
            DIGEST=$(curl -s -I -u "$AUTH" -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              "https://$REGISTRY/v2/$REPO/manifests/$TAG" | grep -i "Docker-Content-Digest" | awk '{print $2}' | tr -d '\r')
            if [ -n "$DIGEST" ]; then
              TAG_INFO="$TAG_INFO$TAG $DIGEST\n"
            fi
          done

          # 保留最新 10 个，删其余
          COUNT=$(echo -e "$TAG_INFO" | grep -c . || true)
          echo "Current tags (excl latest): $COUNT"
          if [ "$COUNT" -gt 10 ]; then
            OLD=$(echo -e "$TAG_INFO" | head -n $((COUNT - 10)))
            echo "$OLD" | while read TAG DIGEST; do
              echo "Deleting old ACR tag: $TAG (digest: $DIGEST)"
              curl -s -X DELETE -u "$AUTH" "https://$REGISTRY/v2/$REPO/manifests/$DIGEST" || true
            done
          fi

  # ==================== 前端: Build → Upload OSS → Object 公共读 ====================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://api.xieyucheng.top/api
        run: npm run build

      - name: Install ossutil
        run: |
          curl -L -o ossutil https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil && sudo mv ossutil /usr/local/bin/ossutil

      - name: Upload to OSS and set public-read
        run: |
          ossutil config \
            -e "oss-${{ env.OSS_REGION }}.aliyuncs.com" \
            -i "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            -k "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"
          # 上传时直接指定 object ACL 为 public-read
          ossutil cp -rf frontend/dist/ "oss://${{ env.OSS_BUCKET }}/" --acl public-read
