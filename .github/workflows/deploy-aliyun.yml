name: Build and Push (ACR + OSS)

# 两段式流水线 - 阶段1: GitHub Actions 只负责 build + push
# 阶段2: ECS 上 systemd timer (eap-autodeploy) 自动轮询 ACR 拉取新镜像部署

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: crpi-fswclfmtgfktdkq7.cn-guangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: eap-app
  OSS_REGION: cn-shenzhen
  OSS_BUCKET: eap-frontend-xyc

jobs:
  # ==================== 后端: Build → Push ACR ====================
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ github.sha }}" ./backend
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

  # ==================== 前端: Build → Push OSS ====================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://api.xieyucheng.top/api
        run: npm run build

      - name: Install ossutil v1
        run: |
          curl -L -o ossutil https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/ossutil

      - name: Sync to OSS
        run: |
          ENDPOINT="oss-${{ env.OSS_REGION }}.aliyuncs.com"
          ossutil config -e "${ENDPOINT}" -i "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" -k "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"

          # 上传所有前端文件到 OSS
          ossutil cp -rf frontend/dist/ "oss://${{ env.OSS_BUCKET }}/"

      - name: Refresh CDN cache
        run: |
          pip install aliyun-python-sdk-cdn aliyun-python-sdk-core
          aliyun cdn RefreshObjectCaches \
            --ObjectPath "https://www.xieyucheng.top/" \
            --ObjectType Directory \
            --RegionId cn-shenzhen
        continue-on-error: true
