name: Build and Deploy

# 纯 GitHub Actions 流水线:
#   后端 build → push ACR (GitHub-hosted runner)
#   前端 build → upload OSS (GitHub-hosted runner)
#   deploy → podman play kube (self-hosted runner on ECS, production environment)
#
# 安全:
#   - deploy job 只在 push to main 时触发 (fork PR 不会跑)
#   - production environment 保护 secrets (fork PR 无法访问)
#   - Repo Settings 禁止 fork PR 使用 self-hosted runner
#
# 访问:
#   www.xieyucheng.top → CDN → OSS (object 公共读 + 静态网站托管) → 前端
#   api.xieyucheng.top → CDN → ECS:8080 → 后端

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  ACR_REGISTRY: crpi-fswclfmtgfktdkq7.cn-guangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: eap-app
  OSS_REGION: cn-shenzhen
  OSS_BUCKET: eap-frontend-xyc

jobs:
  # ==================== 后端: Build → Push ACR ====================
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend"
          TAG="$(date -u +%Y%m%d%H%M%S)-${{ github.sha }}"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${TAG}" ./backend
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${TAG}"

      - name: Clean old ACR tags (keep latest 10)
        run: |
          REGISTRY="${{ env.ACR_REGISTRY }}"
          REPO="${{ env.ACR_NAMESPACE }}/backend"
          AUTH="${{ secrets.ACR_USERNAME }}:${{ secrets.ACR_PASSWORD }}"

          TAGS=$(curl -s -u "$AUTH" "https://$REGISTRY/v2/$REPO/tags/list" | jq -r '.tags[]' | grep -v latest | sort -r)

          COUNT=$(echo "$TAGS" | grep -c . || true)
          echo "Current tags (excl latest): $COUNT"
          if [ "$COUNT" -gt 10 ]; then
            OLD=$(echo "$TAGS" | tail -n $((COUNT - 10)))
            for TAG in $OLD; do
              DIGEST=$(curl -s -I -u "$AUTH" -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
                "https://$REGISTRY/v2/$REPO/manifests/$TAG" | grep -i "Docker-Content-Digest" | awk '{print $2}' | tr -d '\r')
              if [ -n "$DIGEST" ]; then
                echo "Deleting old ACR tag: $TAG (digest: $DIGEST)"
                curl -s -X DELETE -u "$AUTH" "https://$REGISTRY/v2/$REPO/manifests/$DIGEST" || true
              fi
            done
          fi

  # ==================== 前端: Build → Upload OSS → Object 公共读 ====================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://api.xieyucheng.top/api
        run: npm run build

      - name: Install ossutil
        run: |
          curl -L -o ossutil https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil && sudo mv ossutil /usr/local/bin/ossutil

      - name: Upload to OSS and set public-read
        run: |
          ossutil config \
            -e "oss-${{ env.OSS_REGION }}.aliyuncs.com" \
            -i "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            -k "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}"
          ossutil cp -rf frontend/dist/ "oss://${{ env.OSS_BUCKET }}/" --acl public-read

  # ==================== 部署: self-hosted runner on ECS ====================
  deploy:
    runs-on: [self-hosted, eap-prod]
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        run: |
          podman login -u "${{ secrets.ACR_USERNAME }}" -p "${{ secrets.ACR_PASSWORD }}" "${{ env.ACR_REGISTRY }}"

      - name: Deploy with podman
        run: |
          # Stop existing container if any
          podman rm -f eap-backend 2>/dev/null || true
          # Pull latest image and run
          podman pull "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend:latest"
          podman run -d --name eap-backend \
            --replace \
            -p 8080:8080 \
            -v /opt/eap/data:/app/data \
            -e APP_ENV=production \
            -e APP_LLM__BACKEND=llm \
            -e APP_SEED_ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
            -e APP_SEED_ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            -e APP_DATABASE__URL="sqlite:///app/data/platform.db?mode=rwc" \
            "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend:latest"

      - name: Health check
        run: |
          sleep 5
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/graphql 2>/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for service... ($i/10)"
            sleep 3
          done
          echo "Health check failed"
          exit 1
