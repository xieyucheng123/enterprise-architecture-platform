name: PR Auto-Fix

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to auto-fix"
        required: true
        type: string
      head_branch:
        description: "PR head branch name"
        required: true
        type: string
      head_sha:
        description: "PR head SHA"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          PR_NUMBER="${PR_NUMBER}"
          HEAD_SHA="${HEAD_SHA}"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

          REVIEW_BODY=$(gh api repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews \
            --paginate \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and (.state == "CHANGES_REQUESTED" or .state == "COMMENTED"))] | sort_by(.submitted_at) | last | .body')
          echo "review_body<<REVIEW_EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_BODY" >> $GITHUB_OUTPUT
          echo "REVIEW_EOF" >> $GITHUB_OUTPUT

          REVIEW_COUNT=$(gh api repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews \
            --paginate \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and (.state == "CHANGES_REQUESTED" or .state == "COMMENTED"))] | length')
          echo "iteration=$REVIEW_COUNT" >> $GITHUB_OUTPUT

          if [ "$REVIEW_COUNT" -gt 3 ]; then
            echo "::error::Max auto-fix iterations (3) exceeded"
            gh api repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments \
              -f body="⚠️ Auto-fix tried 3 times but review still fails. Manual intervention needed."
            exit 1
          fi

      - uses: actions/checkout@v4
        if: steps.pr-info.outputs.pr_number
        with:
          ref: ${{ inputs.head_branch }}
          fetch-depth: 0
          persist-credentials: true
          path: target-repo

      - name: Checkout issue-resolver scripts
        if: steps.pr-info.outputs.pr_number
        uses: actions/checkout@v4
        with:
          repository: link-seek/issue-resolver
          ref: main
          path: issue-resolver-scripts
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        if: steps.pr-info.outputs.pr_number
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        if: steps.pr-info.outputs.pr_number
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Configure Git
        if: steps.pr-info.outputs.pr_number
        shell: bash
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "bot@ai-resolver.dev"

      - name: Run Auto-Fix
        if: steps.pr-info.outputs.pr_number
        shell: bash
        working-directory: target-repo
        env:
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'openai/glm-5.2' }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.modelarts-maas.com/v2' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          REPO_NAME: ${{ github.repository }}
          REVIEW_BODY: ${{ steps.pr-info.outputs.review_body }}
          ITERATION: ${{ steps.pr-info.outputs.iteration }}
        run: |
          uv run --no-project --with openhands-sdk --with openhands-tools \
            python ../issue-resolver-scripts/scripts/auto_fix_pr.py

      - name: Approve pending CI workflows
        if: steps.pr-info.outputs.pr_number
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BRANCH: ${{ inputs.head_branch }}
        run: |
          sleep 15
          for run_id in $(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_branch=$PR_BRANCH&status=action_required" --jq '.workflow_runs[].id' 2>/dev/null); do
            echo "Approving workflow run $run_id..."
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/approve" -X POST 2>/dev/null && echo "Approved $run_id" || echo "Failed to approve $run_id"
          done

      - name: Upload logs
        if: always() && steps.pr-info.outputs.pr_number
        uses: actions/upload-artifact@v4
        with:
          name: auto-fix-logs
          path: target-repo/*.log
          retention-days: 7
          if-no-files-found: ignore
