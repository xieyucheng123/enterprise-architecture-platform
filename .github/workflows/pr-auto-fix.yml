name: PR Auto-Fix

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to auto-fix"
        required: true
        type: string
      head_branch:
        description: "PR head branch name"
        required: true
        type: string
      head_sha:
        description: "PR head SHA"
        required: true
        type: string
      max_iterations:
        description: "Max auto-fix iterations (default 3)"
        required: false
        type: string
        default: "3"

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: auto-fix-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          HEAD_SHA: ${{ inputs.head_sha }}
          MAX_ITERATIONS: ${{ inputs.max_iterations || '3' }}
        run: |
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "max_iterations=$MAX_ITERATIONS" >> $GITHUB_OUTPUT

          REVIEW_BODY=$(gh api repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews \
            --paginate \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and (.state == "CHANGES_REQUESTED" or .state == "COMMENTED"))] | sort_by(.submitted_at) | last | .body')
          echo "review_body<<REVIEW_EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_BODY" >> $GITHUB_OUTPUT
          echo "REVIEW_EOF" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_branch }}
          fetch-depth: 0
          persist-credentials: true
          path: target-repo

      - name: Check iteration limit
        id: iter-check
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          MAX_ITERATIONS: ${{ steps.pr-info.outputs.max_iterations }}
        run: |
          AUTO_FIX_COUNT=$(git log --oneline --grep="^auto-fix:" | wc -l | tr -d ' ')
          echo "auto_fix_count=$AUTO_FIX_COUNT" >> $GITHUB_OUTPUT
          echo "Auto-fix commits on branch: $AUTO_FIX_COUNT (max: $MAX_ITERATIONS)"

          if [ "$AUTO_FIX_COUNT" -ge "$MAX_ITERATIONS" ]; then
            echo "exceeded=true" >> $GITHUB_OUTPUT
            echo "::error::Max auto-fix iterations ($MAX_ITERATIONS) reached (current: $AUTO_FIX_COUNT)"
            BODY="⚠️ Auto-fix 已修 ${AUTO_FIX_COUNT} 轮，review 仍有问题。在 PR 上评论 \`continue-fix\` 可再跑 3 轮自动修复。"
            gh api repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments \
              -f body="$BODY"
            exit 1
          else
            echo "exceeded=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout issue-resolver scripts
        if: ${{ steps.iter-check.outputs.exceeded == 'false' }}
        uses: actions/checkout@v4
        with:
          repository: link-seek/issue-resolver
          ref: main
          path: issue-resolver-scripts
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        if: ${{ steps.iter-check.outputs.exceeded == 'false' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        if: ${{ steps.iter-check.outputs.exceeded == 'false' }}
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Configure Git
        if: ${{ steps.iter-check.outputs.exceeded == 'false' }}
        shell: bash
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "bot@ai-resolver.dev"

      - name: Run Auto-Fix
        if: ${{ steps.iter-check.outputs.exceeded == 'false' }}
        shell: bash
        working-directory: target-repo
        env:
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'openai/glm-5.2' }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.modelarts-maas.com/v2' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          REPO_NAME: ${{ github.repository }}
          REVIEW_BODY: ${{ steps.pr-info.outputs.review_body }}
          ITERATION: ${{ steps.iter-check.outputs.auto_fix_count }}
        run: |
          uv run --no-project --with openhands-sdk --with openhands-tools \
            python ../issue-resolver-scripts/scripts/auto_fix_pr.py

      - name: Approve pending CI workflows
        if: ${{ steps.iter-check.outputs.exceeded == 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BRANCH: ${{ inputs.head_branch }}
        run: |
          sleep 15
          for run_id in $(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_branch=$PR_BRANCH&status=action_required" --jq '.workflow_runs[].id' 2>/dev/null); do
            echo "Approving workflow run $run_id..."
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/approve" -X POST 2>/dev/null && echo "Approved $run_id" || echo "Failed to approve $run_id"
          done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-fix-logs
          path: target-repo/*.log
          retention-days: 7
          if-no-files-found: ignore
