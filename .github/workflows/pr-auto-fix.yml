name: PR Auto-Fix

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    if: |
      github.event.review.state == 'changes_requested' &&
      github.event.review.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check max iterations
        id: check-iter
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          REVIEW_COUNT=$(gh api repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews \
            --paginate \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and .state == "CHANGES_REQUESTED")] | length')
          echo "CHANGES_REQUESTED count: $REVIEW_COUNT"
          echo "count=$REVIEW_COUNT" >> $GITHUB_OUTPUT
          if [ "$REVIEW_COUNT" -gt 3 ]; then
            echo "::error::Max auto-fix iterations (3) exceeded"
            gh api repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments \
              -f body="⚠️ Auto-fix tried 3 times but review still fails. Manual intervention needed."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true
          path: target-repo

      - name: Checkout issue-resolver scripts
        uses: actions/checkout@v4
        with:
          repository: xieyucheng123/issue-resolver
          ref: main
          path: issue-resolver-scripts
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Configure Git
        shell: bash
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "bot@ai-resolver.dev"

      - name: Run Auto-Fix
        shell: bash
        working-directory: target-repo
        env:
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'openai/glm-5.2' }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.modelarts-maas.com/v2' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
          REVIEW_BODY: ${{ github.event.review.body }}
          ITERATION: ${{ steps.check-iter.outputs.count }}
        run: |
          uv run --no-project --with openhands-sdk --with openhands-tools \
            python ../issue-resolver-scripts/scripts/auto_fix_pr.py

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auto-fix-logs
          path: target-repo/*.log
          retention-days: 7
          if-no-files-found: ignore
