name: Build and Push Images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}
      - name: Build and push backend
        env:
          IMAGE: ghcr.io/xieyucheng123/eap-backend
        run: |
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ github.sha }}" ./backend
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Cleanup old GHCR versions (keep latest 5)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          IDS=$(gh api /users/xieyucheng123/packages/container/eap-backend/versions --paginate -q '. | sort_by(.created_at) | reverse | .[5:] | .[].id' 2>/dev/null)
          for id in $IDS; do
            echo "Deleting old GHCR version: $id"
            gh api -X DELETE /users/xieyucheng123/packages/container/eap-backend/versions/$id || true
          done
