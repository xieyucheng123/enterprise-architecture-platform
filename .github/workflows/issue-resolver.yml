name: Auto-resolve issues

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  discussion:
    types: [created]
  discussion_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  discussions: write

jobs:
  auto-resolve:
    uses: link-seek/issue-resolver/.github/workflows/auto-resolve.yml@main
    with:
      trigger-label: "fix-me"
    secrets: inherit
