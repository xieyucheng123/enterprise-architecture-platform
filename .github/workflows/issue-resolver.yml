name: Auto-resolve issues

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  resolve:
    if: |
      github.event.label.name == 'fix-me' ||
      github.event.label.name == 'build-feature' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@openhands-agent') &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR' || github.event.comment.author_association == 'MEMBER'))
    runs-on: ubuntu-latest
    steps:
      - uses: xieyucheng123/issue-resolver@main
        with:
          llm-model: ${{ secrets.LLM_MODEL || 'openai/glm-5.2' }}
          llm-base-url: ${{ secrets.LLM_BASE_URL || 'https://api.modelarts-maas.com/v2' }}
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          github-token: ${{ secrets.PAT_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          issue-type: issue

      - name: Add auto-merge label to PR
        if: success() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="agent/fix-issue-${{ github.event.issue.number }}"
          for i in $(seq 1 10); do
            PR_NUMBER=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null || true)
            if [ -n "$PR_NUMBER" ]; then
              break
            fi
            echo "Waiting for PR on branch $BRANCH... (attempt $i)"
            sleep 10
          done
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "auto-merge"
            echo "Added auto-merge label to PR #$PR_NUMBER"
          else
            echo "No PR found on branch $BRANCH after 100s"
          fi
