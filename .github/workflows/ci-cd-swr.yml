name: Build and Push Image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          IMAGE_NAME: ${{ github.event.repository.name }}
        run: |
          TAG="${{ github.sha }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          IMAGE_LC=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')

          echo "Building ${IMAGE_LC}:${TAG}"
          docker build -t "${IMAGE_LC}:${TAG}" -t "${IMAGE_LC}:latest" .

          echo "Pushing to GHCR..."
          docker push "${IMAGE_LC}:${TAG}"
          docker push "${IMAGE_LC}:latest"

          echo "✅ Image pushed: ${IMAGE_LC}:${TAG}"
          echo "✅ Image pushed: ${IMAGE_LC}:latest"
