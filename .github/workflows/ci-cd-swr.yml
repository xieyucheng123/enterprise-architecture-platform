name: Build and Push Images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/eap-backend
        run: |
          IMAGE_LC=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build -t "${IMAGE_LC}:latest" -t "${IMAGE_LC}:${{ github.sha }}" .
          docker push "${IMAGE_LC}:latest"
          docker push "${IMAGE_LC}:${{ github.sha }}"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push frontend
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/eap-frontend
        run: |
          IMAGE_LC=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build -t "${IMAGE_LC}:latest" -t "${IMAGE_LC}:${{ github.sha }}" ./frontend
          docker push "${IMAGE_LC}:latest"
          docker push "${IMAGE_LC}:${{ github.sha }}"
