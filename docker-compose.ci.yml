services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - APP_DATABASE__URL=sqlite://./data/platform.db?mode=rwc
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 3s
      retries: 30

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 2s
      timeout: 3s
      retries: 10
