name: Auto-resolve issues

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  resolve:
    if: |
      github.event.label.name == 'fix-me' ||
      github.event.label.name == 'build-feature' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@openhands-agent') &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR' || github.event.comment.author_association == 'MEMBER'))
    runs-on: ubuntu-latest
    steps:
      - uses: xieyucheng123/issue-resolver@main
        with:
          llm-model: ${{ secrets.LLM_MODEL || 'openai/glm-5.2' }}
          llm-base-url: ${{ secrets.LLM_BASE_URL || 'https://api.modelarts-maas.com/v2' }}
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          github-token: ${{ secrets.PAT_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          issue-type: issue
